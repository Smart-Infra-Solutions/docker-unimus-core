---
kind: pipeline
type: docker
name: Building..
platform:
  os: linux
  arch: arm64
node:
  drone: bzk
steps:
- name: download latest Unimus-core
  image: alpine:latest
  commands:
    - apk add --no-cache wget
    - wget -O /drone/src/files/Unimus-Core.jar https://download.unimus.net/unimus-core/-%20Latest/Unimus-Core.jar
    - wget -O /drone/src/files/elastic-apm-agent.jar https://repo1.maven.org/maven2/co/elastic/apm/elastic-apm-agent/1.32.0/elastic-apm-agent-1.32.0.jar
- name: build & push
  image: plugins/docker
  settings:
    repo: smartinfrasolutions/unimus-core
    tags: [ "latest" ]
    username: smartinfrasolutions
    password:
      from_secret: dockerhub_token
- name: notification
  image: plugins/webhook
  settings:
    urls:
      from_secret: webhookgotify
    content_type: application/json
    template: |
      {
       "message": "{{ repo.owner }} as updated {{ repo.name }} with {{ build.status }}.",
       "priority": 4,
       "title": "{{ repo.name }} build"
      }
  when:
    status: [success, failure]
---
kind: signature
hmac: eca8cdbf36595f57c1c3f3e34fe71b5a821727ef8c3f773f1636564f6ef57f99

...
