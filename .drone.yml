---
kind: pipeline
type: docker
name: Building..
platform:
  os: linux
  arch: arm
node:
  drone: ch1
steps:
- name: download latest Unimus-core
  image: alpine:latest
  commands:
    - apk add --no-cache wget
    - wget -O /drone/src/files/Unimus-Core.jar https://download.unimus.net/unimus-core/-%20Latest/Unimus-Core.jar
- name: build & push
  image: plugins/docker
  settings:
    repo: smartinfrasolutions/unimus-core
    tags: [ "latest" ]
    username: smartinfrasolutions
    password:
      from_secret: dockerhub_token
- name: notification
  image: plugins/webhook
  settings:
    urls:
      from_secret: webhookgotify
    content_type: application/json
    template: |
      {
       "message": "{{ repo.owner }} as updated {{ repo.name }} with {{ build.status }}.",
       "priority": 4,
       "title": "{{ repo.name }} build"
      }
  when:
    status: [success, failure]
---
kind: signature
hmac: f5a184549a62f82ab9bcb0ad165740ad681c869b9d9a1e12670abd16fdbeba09

...
