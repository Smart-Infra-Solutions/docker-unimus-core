---
kind: pipeline
type: docker
name: Building..
platform:
  os: linux
  arch: arm64
node:
  drone: bzk
steps:
- name: download latest Unimus-core
  image: alpine:latest
  commands:
    - apk add --no-cache wget
    - wget -O /drone/src/files/Unimus-Core.jar https://download.unimus.net/unimus-core/-%20Latest/Unimus-Core.jar
    - wget -O /drone/src/files/apm-agent-attach-cli.jar https://search.maven.org/remotecontent?filepath=co/elastic/apm/apm-agent-attach-cli/1.32.0/apm-agent-attach-cli-1.32.0.jar
- name: build & push
  image: plugins/docker
  settings:
    repo: smartinfrasolutions/unimus-core
    tags: [ "latest" ]
    username: smartinfrasolutions
    password:
      from_secret: dockerhub_token
- name: notification
  image: plugins/webhook
  settings:
    urls:
      from_secret: webhookgotify
    content_type: application/json
    template: |
      {
       "message": "{{ repo.owner }} as updated {{ repo.name }} with {{ build.status }}.",
       "priority": 4,
       "title": "{{ repo.name }} build"
      }
  when:
    status: [success, failure]
---
kind: signature
hmac: 8a8dd6f225964990e5abacabaac066065c8eb0f9e3be06d45379fbc6452fe731

...
